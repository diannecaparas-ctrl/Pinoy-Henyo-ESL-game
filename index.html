<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoy Henyo</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">

    <style>
       /* ================================= */
/* GLOBAL RESET */
/* ================================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    color: white;
    background:
        radial-gradient(circle at top left, #123a8a 0%, #06101f 45%, #000000 100%);
}


/* ================================= */
/* FULLSCREEN SECTIONS */
/* ================================= */
section {
    width: 100%;
    min-height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    position: relative;
    z-index: 2;

    padding: 30px;
}


/* ================================= */
/* FLOATING BACKGROUND SHAPES */
/* ================================= */
#background-effects {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
}

.floating-shape {
    position: absolute;
    opacity: 0.08;
    animation: floatShape 18s infinite linear;
}

.shape1 {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: white;
    top: 8%;
    left: 12%;
}

.shape2 {
    width: 100px;
    height: 100px;
    background: white;
    top: 70%;
    left: 80%;
    transform: rotate(30deg);
}

.shape3 {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: white;
    top: 55%;
    left: 10%;
}

.shape4 {
    width: 120px;
    height: 120px;
    background: white;
    top: 15%;
    left: 75%;
    transform: rotate(20deg);
}

@keyframes floatShape {
    0% {
        transform: translateY(0px) rotate(0deg);
    }
    50% {
        transform: translateY(-35px) rotate(180deg);
    }
    100% {
        transform: translateY(0px) rotate(360deg);
    }
}


/* ================================= */
/* START SCREEN */
/* ================================= */
#branding {
    text-align: center;
    margin-bottom: 35px;
}

#game-title {
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 900;
    letter-spacing: 3px;
    color: white;
    text-shadow:
        0 0 10px #3f7cff,
        0 0 25px #3f7cff,
        0 0 45px #3f7cff;
}

#game-subtitle {
    margin-top: 10px;
    font-size: 1.3rem;
    color: #ffd34f;
    font-weight: 700;
}


/* ================================= */
/* CUSTOM WORD BOX */
/* ================================= */
#custom-word-box {
    width: min(700px, 90%);
    margin-bottom: 30px;
    text-align: center;
}

#custom-word-box label {
    display: block;
    margin-bottom: 12px;
    font-weight: 700;
}

#custom-words {
    width: 100%;
    min-height: 130px;
    border: none;
    border-radius: 18px;
    padding: 18px;
    font-size: 1rem;
    resize: none;
    outline: none;

    background: rgba(255,255,255,0.1);
    color: white;
    backdrop-filter: blur(8px);
}


/* ================================= */
/* DIFFICULTY BUTTONS */
/* ================================= */
#difficulty-select {
    margin-bottom: 30px;
    text-align: center;
}

#difficulty-select label {
    display: block;
    margin-bottom: 15px;
    font-weight: 700;
}

#difficulty-select button,
#start-game-btn,
#controls button,
#play-again-btn {
    border: none;
    cursor: pointer;
    border-radius: 18px;
    font-weight: 800;
    transition: all 0.25s ease;
}

#difficulty-select button {
    margin: 0 8px;
    padding: 14px 24px;
    background: #234fa8;
    color: white;
}

#difficulty-select button:hover {
    transform: scale(1.08);
}


/* ================================= */
/* START BUTTON */
/* ================================= */
#start-game-btn {
    padding: 18px 50px;
    font-size: 1.2rem;
    background: #ffd34f;
    color: #111;
    box-shadow: 0 0 20px rgba(255,211,79,0.5);
}

#start-game-btn:hover {
    transform: scale(1.08);
}


/* ================================= */
/* GAME SCREEN */
/* ================================= */
#category-label {
    position: absolute;
    top: 30px;

    padding: 10px 24px;
    border-radius: 999px;

    background: rgba(255,255,255,0.1);
    font-weight: 700;
    font-size: 1rem;
    backdrop-filter: blur(8px);
}


/* ================================= */
/* TIMER */
/* ================================= */
#timer-display {
    position: absolute;
    top: 75px;

    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    color: #ffd34f;

    text-shadow:
        0 0 10px rgba(255,211,79,0.7),
        0 0 25px rgba(255,211,79,0.5);
}

/* add this class later via JS */
.timer-warning {
    color: #ff3d3d !important;
    animation: shakeTimer 0.4s infinite;
}

@keyframes shakeTimer {
    0% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    50% { transform: translateX(3px); }
    75% { transform: translateX(-3px); }
    100% { transform: translateX(0); }
}


/* ================================= */
/* MASSIVE WORD DISPLAY */
/* ================================= */
#word-container {
    display: flex;
    justify-content: center;
    align-items: center;
    flex: 1;
}

#word-display {
    font-size: clamp(3rem, 12vw, 9rem);
    font-weight: 900;
    text-align: center;
    text-transform: uppercase;
    line-height: 1;

    text-shadow:
        0 0 15px rgba(255,255,255,0.3),
        0 0 35px rgba(63,124,255,0.5);

    padding: 20px;
}

/* trigger on word change later */
.word-bounce {
    animation: bounceWord 0.5s ease;
}

@keyframes bounceWord {
    0% { transform: scale(0.7); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
}


/* ================================= */
/* CONTROL BUTTONS */
/* ================================= */
#controls {
    width: min(900px, 95%);
    display: flex;
    gap: 18px;
    margin-bottom: 40px;
}

#controls button {
    flex: 1;
    padding: 22px;
    font-size: 1.4rem;
    color: white;
}

#pass-btn {
    background: #ff9f1c;
}

#correct-btn {
    background: #00b84d;
}

#pause-btn {
    background: #d7263d;
}

#controls button:hover {
    transform: scale(1.04);
}


/* ================================= */
/* REVIEW SCREEN */
/* ================================= */
#review-screen h2 {
    margin-bottom: 25px;
    font-size: 2rem;
}

#review-table {
    width: min(800px, 95%);
    border-collapse: collapse;
    margin-bottom: 30px;

    background: rgba(255,255,255,0.08);
    border-radius: 18px;
    overflow: hidden;
}

#review-table th,
#review-table td {
    padding: 16px;
    text-align: center;
}

#review-table th {
    background: rgba(255,255,255,0.12);
}

#review-table tr:nth-child(even) {
    background: rgba(255,255,255,0.04);
}

#play-again-btn {
    padding: 16px 40px;
    background: #ffd34f;
    color: black;
}


/* ================================= */
/* RESPONSIVE */
/* ================================= */
@media (max-width: 768px) {
    #controls {
        flex-direction: column;
    }

    #timer-display {
        top: 95px;
    }

    #category-label {
        top: 25px;
    }
}
    </style>
</head>
<body>

    <!-- ================================= -->
    <!-- FLOATING BACKGROUND EFFECTS -->
    <!-- ================================= -->
    <div id="background-effects">
        <div class="floating-shape shape1"></div>
        <div class="floating-shape shape2"></div>
        <div class="floating-shape shape3"></div>
        <div class="floating-shape shape4"></div>
    </div>


    <!-- ================================= -->
    <!-- START SCREEN -->
    <!-- ================================= -->
    <section id="start-screen">

        <div id="branding">
            <h1 id="game-title">PINOY HENYO</h1>
            <h2 id="game-subtitle">How many words can you guess?</h2>
        </div>

        <div id="custom-word-box">
            <label for="custom-words">
                Paste custom words (comma-separated):
            </label>

            <textarea
                id="custom-words"
                placeholder="cat, airplane, volcano, basketball..."
            ></textarea>
        </div>

        <div id="difficulty-select">
            <label>Select Difficulty:</label>

            <button id="easy-btn">Easy</button>
            <button id="medium-btn">Medium</button>
            <button id="hard-btn">Hard</button>
        </div>

        <button id="start-game-btn">
            START GAME
        </button>

    </section>


    <!-- ================================= -->
    <!-- GAME SCREEN -->
    <!-- ================================= -->
    <section id="game-screen" hidden>

        <!-- Category Label -->
        <div id="category-label">
            Category: Animal
        </div>

        <!-- Timer -->
        <div id="timer-display">
            02:00
        </div>

        <!-- Massive Word Display -->
        <div id="word-container">
            <div id="word-display">
                ELEPHANT
            </div>
        </div>

        <!-- Controls -->
        <div id="controls">

            <button id="pass-btn">
                PASS
            </button>

            <button id="correct-btn">
                CORRECT
            </button>

            <button id="pause-btn">
                PAUSE
            </button>

        </div>

    </section>


    <!-- ================================= -->
    <!-- REVIEW SCREEN -->
    <!-- ================================= -->
    <section id="review-screen" hidden>

        <h2>Game Summary</h2>

        <table id="review-table">

            <thead>
                <tr>
                    <th>Word</th>
                    <th>Category</th>
                    <th>Result</th>
                </tr>
            </thead>

            <tbody id="review-body">
                <!-- JS inserts rows here -->
            </tbody>

        </table>

        <button id="play-again-btn">
            PLAY AGAIN
        </button>

    </section>


    <!-- ================================= -->
    <!-- AUDIO PLACEHOLDERS -->
    <!-- ================================= -->
    <audio id="bg-music" src="gamemusic1.mp3"></audio>
    <audio id="correct-sound" src="correct.mp3"></audio>
    <audio id="pass-sound" src="pass.mp3"></audio>
    <audio id="timer-warning-sound" src="timer.mp3"></audio>


    <script>
       /* ================================= */
/* GAME DATA */
/* ================================= */

const wordBank = {
    easy: [
        { word: "CAT", category: "Animal" },
        { word: "MANGO", category: "Food" },
        { word: "SCHOOL", category: "Place" },
        { word: "CHAIR", category: "Object" },
        { word: "BIRTHDAY", category: "Event" }
    ],

    medium: [
        { word: "VOLCANO", category: "Nature" },
        { word: "AIRPORT", category: "Place" },
        { word: "DINOSAUR", category: "Animal" },
        { word: "BASKETBALL", category: "Sport" },
        { word: "TELESCOPE", category: "Object" }
    ],

    hard: [
        { word: "REVOLUTION", category: "Concept" },
        { word: "ARCHAEOLOGY", category: "Field" },
        { word: "CONSTELLATION", category: "Space" },
        { word: "METAMORPHOSIS", category: "Science" },
        { word: "PHILOSOPHER", category: "Person" }
    ]
};


/* ================================= */
/* DOM ELEMENTS */
/* ================================= */

const startScreen = document.getElementById("start-screen");
const gameScreen = document.getElementById("game-screen");
const reviewScreen = document.getElementById("review-screen");

const startBtn = document.getElementById("start-game-btn");
const playAgainBtn = document.getElementById("play-again-btn");

const easyBtn = document.getElementById("easy-btn");
const mediumBtn = document.getElementById("medium-btn");
const hardBtn = document.getElementById("hard-btn");

const timerDisplay = document.getElementById("timer-display");
const wordDisplay = document.getElementById("word-display");
const categoryLabel = document.getElementById("category-label");

const passBtn = document.getElementById("pass-btn");
const correctBtn = document.getElementById("correct-btn");
const pauseBtn = document.getElementById("pause-btn");

const reviewBody = document.getElementById("review-body");
const customWordsBox = document.getElementById("custom-words");


/* AUDIO */

const bgMusic = document.getElementById("bg-music");
const correctSound = document.getElementById("correct-sound");
const passSound = document.getElementById("pass-sound");
const timerSound = document.getElementById("timer-warning-sound");


/* ================================= */
/* GAME STATE */
/* ================================= */

let selectedDifficulty = "easy";
let activeWords = [];
let currentWord = null;

let timer = 120;
let timerInterval = null;
let isPaused = false;

let reviewLog = [];


/* ================================= */
/* DIFFICULTY SELECT */
/* ================================= */

easyBtn.onclick = () => selectedDifficulty = "easy";
mediumBtn.onclick = () => selectedDifficulty = "medium";
hardBtn.onclick = () => selectedDifficulty = "hard";


/* ================================= */
/* START GAME */
/* ================================= */

startBtn.addEventListener("click", startGame);

function startGame() {
    reviewLog = [];
    timer = 120;
    isPaused = false;

    buildWordList();

    startScreen.hidden = true;
    reviewScreen.hidden = true;
    gameScreen.hidden = false;

    updateTimerDisplay();
    showNextWord();

    startTimer();
    playMusic();
}


/* ================================= */
/* BUILD WORD LIST */
/* ================================= */

function buildWordList() {
    const customText = customWordsBox.value.trim();

    if (customText !== "") {

        activeWords = [];

        /* Split by new lines first */
        const lines = customText
            .split("\n")
            .map(line => line.trim())
            .filter(line => line !== "");

        lines.forEach(line => {

            /* FORMAT 1:
               cat | Animal
            */
            if (line.includes("|")) {

                const parts = line
                    .split("|")
                    .map(p => p.trim());

                const word = parts[0];
                const category =
                    parts[1] || "Custom";

                if (word !== "") {
                    activeWords.push({
                        word: word.toUpperCase(),
                        category: category
                    });
                }
            }

            /* FORMAT 2:
               cat, dog, banana
            */
            else if (line.includes(",")) {

                const words = line
                    .split(",")
                    .map(w => w.trim())
                    .filter(w => w !== "");

                words.forEach(word => {
                    activeWords.push({
                        word: word.toUpperCase(),
                        category: "Custom"
                    });
                });
            }

            /* FORMAT 3:
               single word only
            */
            else {
                activeWords.push({
                    word: line.toUpperCase(),
                    category: "Custom"
                });
            }
        });

    } else {
        activeWords = [...wordBank[selectedDifficulty]];
    }

    shuffleArray(activeWords);
}

/* ================================= */
/* SHOW NEXT WORD */
/* ================================= */

function showNextWord() {

    if (activeWords.length === 0) {
        endGame();
        return;
    }

    currentWord = activeWords.pop();

    wordDisplay.textContent = currentWord.word;
    categoryLabel.textContent =
        "Category: " + currentWord.category;

    triggerWordBounce();
}


/* ================================= */
/* PASS / CORRECT */
/* ================================= */

passBtn.addEventListener("click", () => {
    if (isPaused) return;

    playSound(passSound);

    reviewLog.push({
        word: currentWord.word,
        category: currentWord.category,
        result: "Passed"
    });

    showNextWord();
});

correctBtn.addEventListener("click", () => {
    if (isPaused) return;

    playSound(correctSound);

    reviewLog.push({
        word: currentWord.word,
        category: currentWord.category,
        result: "Correct"
    });

    showNextWord();
});


/* ================================= */
/* PAUSE */
/* ================================= */

pauseBtn.addEventListener("click", () => {
    isPaused = !isPaused;

    pauseBtn.textContent =
        isPaused ? "RESUME" : "PAUSE";
});


/* ================================= */
/* TIMER */
/* ================================= */

function startTimer() {

    clearInterval(timerInterval);

    timerInterval = setInterval(() => {

        if (isPaused) return;

        timer--;

        updateTimerDisplay();

        if (timer === 10) {
            timerDisplay.classList.add(
                "timer-warning"
            );

            playSound(timerSound);
        }

        if (timer <= 0) {
            endGame();
        }

    }, 1000);
}


function updateTimerDisplay() {

    const minutes = Math.floor(timer / 60);
    const seconds = timer % 60;

    const mm = String(minutes).padStart(2, "0");
    const ss = String(seconds).padStart(2, "0");

    timerDisplay.textContent = `${mm}:${ss}`;
}


/* ================================= */
/* END GAME */
/* ================================= */

function endGame() {

    clearInterval(timerInterval);

    bgMusic.pause();

    gameScreen.hidden = true;
    reviewScreen.hidden = false;

    buildReviewTable();
}


/* ================================= */
/* REVIEW TABLE */
/* ================================= */

function buildReviewTable() {

    reviewBody.innerHTML = "";

    reviewLog.forEach(item => {

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${item.word}</td>
            <td>${item.category}</td>
            <td>${item.result}</td>
        `;

        reviewBody.appendChild(row);
    });
}


/* ================================= */
/* PLAY AGAIN */
/* ================================= */

playAgainBtn.addEventListener(
    "click",
    () => {
        startScreen.hidden = false;
        reviewScreen.hidden = true;
        timerDisplay.classList.remove(
            "timer-warning"
        );
    }
);


/* ================================= */
/* ANIMATIONS */
/* ================================= */

function triggerWordBounce() {

    wordDisplay.classList.remove(
        "word-bounce"
    );

    void wordDisplay.offsetWidth;

    wordDisplay.classList.add(
        "word-bounce"
    );
}


/* ================================= */
/* SOUND HELPERS */
/* ================================= */

function playSound(sound) {
    try {
        sound.currentTime = 0;
        sound.play();
    } catch (error) {
        console.log(error);
    }
}

function playMusic() {
    try {
        bgMusic.currentTime = 0;
        bgMusic.loop = true;
        bgMusic.volume = 0.35;
        bgMusic.play();
    } catch (error) {
        console.log(error);
    }
}


/* ================================= */
/* SHUFFLE */
/* ================================= */

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {

        const j = Math.floor(
            Math.random() * (i + 1)
        );

        [array[i], array[j]] =
        [array[j], array[i]];
    }
}
    </script>

</body>
</html>
