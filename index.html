<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoy Henyo - Extreme Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto+Condensed:wght@700&display=swap');
        :root { --gold: #f1c40f; --orange: #e67e22; --red: #e74c3c; --dark: #2c3e50; }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background: radial-gradient(circle, #f39c12 0%, #d35400 70%, #8e0000 100%);
            color: white; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .game-container {
            width: 95vw; height: 90vh; border: 12px solid var(--dark); border-radius: 50px;
            background: rgba(0, 0, 0, 0.15); position: relative; display: flex; flex-direction: column; 
            justify-content: flex-start; align-items: center; box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
            padding-top: 40px; box-sizing: border-box;
        }

        .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active { display: flex; }

        /* Setup Screen */
        .setup-box { background: rgba(255,255,255,0.9); color: #333; padding: 20px; border-radius: 20px; width: 600px; max-height: 70vh; overflow-y: auto; }
        .cat-group { margin-bottom: 10px; }
        .cat-group label { font-weight: bold; color: var(--dark); display: block; font-size: 0.9rem; }
        .cat-group input { width: 95%; padding: 8px; border: 2px solid #ddd; border-radius: 8px; }

        /* HUD - No Overlap */
        .hud {
            width: 90%; height: 80px; display: flex; justify-content: space-between;
            padding: 0 50px; background: rgba(0,0,0,0.85); border-radius: 100px; align-items: center;
            margin-bottom: 30px; border: 2px solid rgba(255,255,255,0.1);
        }
        .lives-container { display: flex; gap: 10px; font-size: 2.5rem; }
        .heart { color: var(--red); text-shadow: 2px 2px #000; transition: 0.3s; }
        .heart.lost { opacity: 0; transform: scale(0); }

        /* Word Card */
        .word-box {
            background: #fff; color: #111; padding: 40px; border-radius: 35px;
            width: 750px; height: 280px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 20px 0px #bdc3c7; margin-bottom: 30px;
        }
        #word-text { font-size: 8rem; text-align: center; text-transform: uppercase; font-weight: 900; }

        /* PANIC MODE SHAKE */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .panic-shake { animation: shake 0.2s infinite !important; border-color: #ff4757 !important; }
        .panic-text { color: #ff4757 !important; animation: pulse 0.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }

        /* Buttons */
        .btn {
            padding: 18px 50px; font-size: 1.6rem; font-weight: 900; border-radius: 100px; border: none; cursor: pointer; color: white;
            background: linear-gradient(to bottom, #f1c40f 0%, #d35400 100%); box-shadow: 0 8px 0 #914500; text-transform: uppercase;
        }
        .btn-green { background: linear-gradient(to bottom, #2ecc71, #27ae60); box-shadow: 0 8px 0 #1e8449; }
        .btn-red { background: linear-gradient(to bottom, #e74c3c, #c0392b); box-shadow: 0 8px 0 #962d22; }

        #end-modal {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; 
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div class="game-container" id="main-board">
    
    <div id="setup-screen" class="screen active">
        <h1 style="font-family:'Luckiest Guy'; font-size:3rem; color:var(--gold);">TEACHER SETTINGS</h1>
        <div class="setup-box">
            <div class="cat-group"><label>🦷 BODY PART</label><input type="text" class="save-data" data-cat="BODY PART"></div>
            <div class="cat-group"><label>🍔 FOOD</label><input type="text" class="save-data" data-cat="FOOD"></div>
            <div class="cat-group"><label>👮 JOB</label><input type="text" class="save-data" data-cat="JOB"></div>
            <div class="cat-group"><label>🦁 ANIMAL</label><input type="text" class="save-data" data-cat="ANIMAL"></div>
            <div class="cat-group"><label>📍 PLACE</label><input type="text" class="save-data" data-cat="PLACE"></div>
            <div class="cat-group"><label>🏃 ACTION</label><input type="text" class="save-data" data-cat="ACTION"></div>
            <div class="cat-group"><label>💡 OBJECT</label><input type="text" class="save-data" data-cat="OBJECT"></div>
            <div style="margin-top:20px; display:flex; gap:10px; justify-content: center;">
                <button class="btn btn-green" onclick="saveAndEnter()">ENTER</button>
                <button class="btn" style="background:#7f8c8d; box-shadow:0 8px 0 #2c3e50" onclick="resetMemory()">RESET</button>
            </div>
        </div>
    </div>

    <div id="title-screen" class="screen">
        <h1 style="font-family:'Luckiest Guy'; font-size:10rem; color:var(--gold); margin:0; text-shadow: 10px 10px 0 #000;">PINOY HENYO</h1>
        <button class="btn" style="margin-top:40px; font-size:3rem; padding: 20px 80px;" onclick="startCountdown()">START</button>
    </div>

    <div id="countdown-screen" class="screen">
        <h1 id="count-number" style="font-family:'Luckiest Guy'; font-size:15rem; color:var(--gold); text-shadow: 10px 10px 0 #000;">3</h1>
    </div>

    <div id="game-screen" class="screen">
        <div class="hud">
            <div id="category-display" style="font-size: 1.8rem; font-family:'Luckiest Guy'; color:var(--gold);">CATEGORY: ???</div>
            <div class="lives-container">
                <span class="heart" id="h1">❤</span>
                <span class="heart" id="h2">❤</span>
                <span class="heart" id="h3">❤</span>
            </div>
            <div id="timer-display" style="font-size: 2.2rem; font-family:'Luckiest Guy';">2:00</div>
        </div>
        
        <div class="word-box"><div id="word-text">READY?</div></div>

        <div style="display:flex; gap:30px;">
            <button class="btn btn-green" onclick="handleCorrect()">CORRECT ✔</button>
            <button class="btn btn-red" onclick="handlePass()">PASS ⏭</button>
        </div>
        <h2 style="margin-top:20px; font-size: 2rem;">SCORE: <span id="score" style="color:var(--gold)">0</span></h2>
    </div>

    <div id="end-modal">
        <h1 id="end-title" style="font-size:8rem; color:var(--red); font-family:'Luckiest Guy';"></h1>
        <p style="font-size:3rem">FINAL SCORE: <span id="final-score" style="color:var(--gold)">0</span></p>
        <button class="btn" onclick="location.reload()">RESTART</button>
    </div>
</div>

<audio id="snd-correct" src="correct.mp3"></audio>
<audio id="snd-pass" src="pass.mp3"></audio>
<audio id="snd-timer" src="timer.mp3"></audio>
<audio id="snd-321go" src="321go.mp3"></audio>
<audio id="snd-over" src="start.mp3"></audio> <script>
    let gameQueue = [];
    let currentIndex = 0;
    let score = 0;
    let lives = 3;
    let timer;
    let timeLeft = 120;

    window.onload = function() {
        const inputs = document.querySelectorAll('.save-data');
        inputs.forEach(input => {
            const savedValue = localStorage.getItem('henyo_' + input.getAttribute('data-cat'));
            if (savedValue) input.value = savedValue;
        });
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function saveAndEnter() {
        const inputs = document.querySelectorAll('.save-data');
        inputs.forEach(input => localStorage.setItem('henyo_' + input.getAttribute('data-cat'), input.value));
        showScreen('title-screen');
    }

    function resetMemory() {
        if(confirm("Clear words?")) { localStorage.clear(); location.reload(); }
    }

    function startCountdown() {
        showScreen('countdown-screen');
        document.getElementById('snd-321go').play();
        let count = 3;
        const countEl = document.getElementById('count-number');
        
        const countInterval = setInterval(() => {
            count--;
            if (count > 0) countEl.innerText = count;
            else if (count === 0) countEl.innerText = "GO!";
            else {
                clearInterval(countInterval);
                prepareAndStart();
            }
        }, 1000);
    }

    function prepareAndStart() {
        gameQueue = [];
        document.querySelectorAll('.save-data').forEach(input => {
            if (input.value) {
                input.value.split(',').forEach(w => {
                    if (w.trim()) gameQueue.push({ word: w.trim(), cat: input.getAttribute('data-cat') });
                });
            }
        });
        if (gameQueue.length === 0) return location.reload();
        gameQueue.sort(() => Math.random() - 0.5);
        showScreen('game-screen');
        showWord();
        startTimer();
    }

    function showWord() {
        if (currentIndex < gameQueue.length) {
            const item = gameQueue[currentIndex];
            const textEl = document.getElementById('word-text');
            textEl.innerText = item.word;
            document.getElementById('category-display').innerText = "CATEGORY: " + item.cat;
            let fs = 8; textEl.style.fontSize = fs + "rem";
            while ((textEl.scrollHeight > 250 || textEl.scrollWidth > 700) && fs > 2) {
                fs -= 0.5; textEl.style.fontSize = fs + "rem";
            }
        } else endGame("FINISHED!");
    }

    function handleCorrect() {
        document.getElementById('snd-correct').play();
        score++;
        document.getElementById('score').innerText = score;
        next();
    }

    function handlePass() {
        document.getElementById('snd-pass').play();
        document.getElementById('h' + lives).classList.add('lost');
        lives--;
        if (lives === 0) endGame("GAME OVER!"); 
        else next();
    }

    function next() { currentIndex++; showWord(); }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            const display = document.getElementById('timer-display');
            const board = document.getElementById('main-board');
            
            display.innerText = `${m}:${s < 10 ? '0'+s : s}`;
            
            if (timeLeft === 10) {
                document.getElementById('snd-timer').play();
                display.classList.add('panic-text');
                board.classList.add('panic-shake');
            }
            if (timeLeft <= 0) endGame("TIME'S UP!");
        }, 1000);
    }

    function endGame(msg) {
        clearInterval(timer);
        document.getElementById('snd-over').play();
        document.getElementById('main-board').classList.remove('panic-shake');
        document.getElementById('end-title').innerText = msg;
        document.getElementById('final-score').innerText = score;
        document.getElementById('end-modal').style.display = 'flex';
    }
</script>
</body>
</html>
