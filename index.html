<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoy Henyo - Ultimate Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto+Condensed:wght@700&display=swap');
        :root { --gold: #f1c40f; --orange: #e67e22; --red: #e74c3c; --blue: #1e5ba0; --dark: #2c3e50; }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background: radial-gradient(circle, #f39c12 0%, #d35400 70%, #8e0000 100%);
            color: white; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .game-container {
            width: 95vw; height: 90vh; border: 12px solid var(--dark); border-radius: 50px;
            background: rgba(0, 0, 0, 0.15); position: relative; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .screen { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; justify-content: center; }
        .active { display: flex; }

        /* 2-COLUMN TEACHER DASHBOARD */
        .setup-box { 
            background: rgba(255,255,255,0.9); padding: 25px; border-radius: 20px; 
            width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }
        .cat-group label { font-weight: bold; color: var(--dark); display: block; font-size: 0.9rem; margin-bottom: 3px; }
        .cat-group input { width: 90%; padding: 8px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }

        /* STAMP TITLE SCREEN (From image_7237a1.jpg) */
        #title-screen { background: var(--blue); }
        .stamp-container {
            background-color: var(--gold); padding: 15px; position: relative;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            -webkit-mask-image: radial-gradient(circle, transparent 8px, black 9px);
            -webkit-mask-size: 30px 30px;
            -webkit-mask-position: -15px -15px;
        }
        .stamp-inner { background-color: #c0392b; padding: 40px 80px; display: flex; flex-direction: column; align-items: center; }
        .text-pinoy { font-family: 'Luckiest Guy'; font-size: 8rem; color: white; margin: 0; line-height: 0.8; }
        .text-henyo { font-family: 'Luckiest Guy'; font-size: 9rem; color: var(--gold); margin: 0; line-height: 0.8; }

        /* GAME HUD & CARD */
        #game-screen { gap: 20px; }
        .hud {
            width: 90%; height: 70px; display: flex; justify-content: space-between;
            padding: 0 40px; background: rgba(0,0,0,0.85); border-radius: 100px; align-items: center;
        }
        .word-box {
            background: #fff; color: #111; border-radius: 35px;
            width: 700px; height: 260px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 18px 0px #bdc3c7;
        }
        #word-text { font-size: 8rem; text-align: center; text-transform: uppercase; font-weight: 900; }

        /* BUTTONS */
        .btn {
            padding: 12px 35px; font-size: 1.2rem; font-weight: 900; border-radius: 100px; border: none; cursor: pointer; color: white;
            background: linear-gradient(to bottom, #f1c40f 0%, #d35400 100%); box-shadow: 0 6px 0 #914500; text-transform: uppercase;
        }
        .btn-green { background: linear-gradient(to bottom, #2ecc71, #27ae60); box-shadow: 0 6px 0 #1e8449; }
        .btn-red { background: linear-gradient(to bottom, #e74c3c, #c0392b); box-shadow: 0 6px 0 #962d22; }
        .btn-grey { background: #7f8c8d; box-shadow: 0 6px 0 #2c3e50; }
        .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #914500; }

        /* PANIC SHAKE */
        @keyframes shake { 0%, 100% {transform: translate(0,0)} 25% {transform: translate(2px,2px)} 75% {transform: translate(-2px,-2px)} }
        .panic-shake { animation: shake 0.1s infinite; }

        #end-modal {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; 
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div class="game-container" id="main-board">
    
    <!-- 1. TEACHER DASHBOARD (2-COLUMN) -->
    <div id="setup-screen" class="screen active">
        <h1 style="font-family:'Luckiest Guy'; font-size:2.5rem; color:var(--gold); margin-bottom:10px;">TEACHER SETTINGS</h1>
        <div class="setup-box">
            <div class="cat-group"><label>🦷 BODY PART</label><input type="text" class="save-data" data-cat="BODY PART"></div>
            <div class="cat-group"><label>📍 PLACE</label><input type="text" class="save-data" data-cat="PLACE"></div>
            <div class="cat-group"><label>🍔 FOOD</label><input type="text" class="save-data" data-cat="FOOD"></div>
            <div class="cat-group"><label>🏃 ACTION</label><input type="text" class="save-data" data-cat="ACTION"></div>
            <div class="cat-group"><label>👮 JOB</label><input type="text" class="save-data" data-cat="JOB"></div>
            <div class="cat-group"><label>💡 OBJECT</label><input type="text" class="save-data" data-cat="OBJECT"></div>
            <div class="cat-group"><label>🦁 ANIMAL</label><input type="text" class="save-data" data-cat="ANIMAL"></div>
            <div class="cat-group"><label>🎆 EVENTS</label><input type="text" class="save-data" data-cat="EVENTS"></div>
        </div>
        
        <div style="margin-top:20px; display:flex; align-items:center; gap:25px;">
            <div style="background:rgba(0,0,0,0.3); padding:10px 20px; border-radius:50px;">
                <span>🔊 VOL:</span>
                <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5" onchange="updateVolume()">
            </div>
            <button class="btn btn-grey" onclick="resetMemory()">RESET</button>
            <button class="btn btn-green" onclick="saveAndEnter()">ENTER</button>
        </div>
    </div>

    <!-- 2. STAMP TITLE PAGE -->
    <div id="title-screen" class="screen">
        <div class="stamp-container">
            <div class="stamp-inner">
                <p class="text-pinoy">PINOY</p>
                <p class="text-henyo">HENYO</p>
            </div>
        </div>
        <div style="margin-top:40px; display:flex; gap:20px;">
            <button class="btn" style="font-size:2rem; padding: 15px 60px;" onclick="startCountdown()">START GAME</button>
            <button class="btn btn-grey" onclick="showScreen('setup-screen')">SETTINGS</button>
        </div>
    </div>

    <!-- 3. COUNTDOWN -->
    <div id="countdown-screen" class="screen">
        <h1 id="count-number" style="font-family:'Luckiest Guy'; font-size:15rem; color:var(--gold);">3</h1>
    </div>

    <!-- 4. GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div class="hud">
            <div id="category-display" style="font-size: 1.5rem; font-family:'Luckiest Guy'; color:var(--gold);">CATEGORY: ???</div>
            <div id="timer-display" style="font-size: 2rem; font-family:'Luckiest Guy'; color:white;">2:00</div>
        </div>
        <div class="word-box"><div id="word-text">...</div></div>
        <div class="controls">
            <button class="btn btn-green" onclick="handleCorrect()">CORRECT ✔</button>
            <button class="btn btn-red" onclick="handlePass()">PASS ⏭</button>
        </div>
        <h2 style="margin:0; font-family:'Luckiest Guy';">SCORE: <span id="score" style="color:var(--gold)">0</span></h2>
    </div>

    <!-- END MODAL -->
    <div id="end-modal">
        <h1 id="end-title" style="font-size:6rem; color:var(--gold); font-family:'Luckiest Guy';"></h1>
        <p style="font-size:2.5rem">FINAL SCORE: <span id="final-score">0</span></p>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>
</div>

<audio id="snd-correct" src="correct.mp3"></audio>
<audio id="snd-pass" src="pass.mp3"></audio>
<audio id="snd-timer" src="timer.mp3"></audio>
<audio id="snd-321go" src="321go.mp3"></audio>
<audio id="snd-finish" src="finish.mp3"></audio>
<audio id="snd-over" src="start.mp3"></audio>

<script>
    let gameQueue = [], currentIndex = 0, score = 0, timer, timeLeft = 120, vol = 0.5;

    window.onload = function() {
        document.querySelectorAll('.save-data').forEach(input => {
            input.value = localStorage.getItem('henyo_' + input.dataset.cat) || "";
        });
        vol = localStorage.getItem('henyo_vol') || 0.5;
        document.getElementById('vol-slider').value = vol;
        updateVolume();
    };

    function updateVolume() {
        vol = document.getElementById('vol-slider').value;
        localStorage.setItem('henyo_vol', vol);
        document.querySelectorAll('audio').forEach(a => a.volume = vol);
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function saveAndEnter() {
        document.querySelectorAll('.save-data').forEach(input => {
            localStorage.setItem('henyo_' + input.dataset.cat, input.value);
        });
        showScreen('title-screen');
    }

    function resetMemory() {
        if(confirm("Clear all words?")) { localStorage.clear(); location.reload(); }
    }

    function startCountdown() {
        showScreen('countdown-screen');
        document.getElementById('snd-321go').play();
        let c = 3;
        const el = document.getElementById('count-number');
        const itv = setInterval(() => {
            c--;
            if(c > 0) el.innerText = c;
            else if(c === 0) el.innerText = "GO!";
            else { clearInterval(itv); prepareGame(); }
        }, 1000);
    }

    function prepareGame() {
        gameQueue = [];
        document.querySelectorAll('.save-data').forEach(input => {
            if(input.value) {
                input.value.split(',').forEach(w => {
                    if(w.trim()) gameQueue.push({w: w.trim(), c: input.dataset.cat});
                });
            }
        });
        if(!gameQueue.length) return showScreen('setup-screen');
        // Shuffle
        for (let i = gameQueue.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [gameQueue[i], gameQueue[j]] = [gameQueue[j], gameQueue[i]];
        }
        showScreen('game-screen');
        showWord();
        startTimer();
    }

    function showWord() {
        if(currentIndex < gameQueue.length) {
            const item = gameQueue[currentIndex];
            document.getElementById('word-text').innerText = item.w;
            document.getElementById('category-display').innerText = "CATEGORY: " + item.c;
        } else endGame(true); // TRIGGER FINISH
    }

    function handleCorrect() {
        document.getElementById('snd-correct').play();
        score++;
        document.getElementById('score').innerText = score;
        next();
    }

    function handlePass() {
        document.getElementById('snd-pass').play();
        next();
    }

    function next() { currentIndex++; showWord(); }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer-display').innerText = `${m}:${s<10?'0'+s:s}`;
            if(timeLeft === 10) {
                document.getElementById('snd-timer').play();
                document.getElementById('main-board').classList.add('panic-shake');
            }
            if(timeLeft <= 0) endGame(false);
        }, 1000);
    }

    function endGame(isFinish) {
        clearInterval(timer);
        document.getElementById('main-board').classList.remove('panic-shake');
        if(isFinish) document.getElementById('snd-finish').play();
        else document.getElementById('snd-over').play();
        document.getElementById('end-modal').style.display = 'flex';
        document.getElementById('end-title').innerText = isFinish ? "EXCELLENT!" : "TIME'S UP!";
        document.getElementById('final-score').innerText = score;
    }
</script>
</body>
</html>
