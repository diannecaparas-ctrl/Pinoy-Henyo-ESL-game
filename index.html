<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoy Henyo Pro: ESL Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --royal-blue: #0047ab;
            --gold: #fcd116;
            --vivid-red: #c8102e;
            --vivid-green: #00a651;
            --vivid-orange: #ff9900;
            --bg-dark: #0f0f0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- TITLE PAGE --- */
        #titlePage {
            position: fixed;
            inset: 0;
            background: url('image_8a0ea8.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .menu-card {
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* --- GAME BOARD --- */
        #gameBoard {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            background: #ce1126; /* Inspired by the red in your image */
            background-image: url('image_8a0e51.jpg'); /* The texture from your theme image */
            background-size: cover;
            background-position: center;
        }

        /* Tribal Borders */
        .border-trim {
            height: 60px;
            width: 100%;
            background: var(--royal-blue);
            border-top: 5px solid var(--gold);
            border-bottom: 5px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .top-trim { position: absolute; top: 0; }
        .bottom-trim { position: absolute; bottom: 0; }

        /* Floating Suns Background */
        #particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .sun-particle {
            position: absolute;
            color: rgba(252, 209, 22, 0.2);
            font-size: 40px;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }

        /* --- CONTENT AREA --- */
        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #timer {
            font-size: 4rem;
            font-weight: bold;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .panic { color: var(--vivid-red) !important; animation: pulse 0.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #wordDisplay {
            font-size: 7rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            color: white;
            text-shadow: 4px 4px 0 var(--royal-blue), 8px 8px 0 rgba(0,0,0,0.5);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-5deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* --- CONTROLS --- */
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 50px;
            width: 90%;
            max-width: 800px;
        }

        .btn {
            flex: 1;
            padding: 25px;
            font-size: 1.8rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
            text-transform: uppercase;
            box-shadow: 0 8px 0 rgba(0,0,0,0.3);
        }

        .btn-pass { background: var(--vivid-orange); }
        .btn-correct { background: var(--vivid-green); }
        .btn-pause { background: var(--royal-blue); }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.3); }

        /* --- TEACHER SETTINGS --- */
        textarea {
            width: 100%;
            height: 100px;
            margin: 15px 0;
            border-radius: 10px;
            padding: 10px;
            font-size: 1rem;
        }

        .hidden { display: none; }

        /* --- REVIEW TABLE --- */
        #reviewScreen {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        table { width: 100%; max-width: 600px; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border: 1px solid #444; text-align: left; }
        .row-correct { background-color: rgba(0, 166, 81, 0.3); }
        .row-passed { background-color: rgba(255, 153, 0, 0.3); }
    </style>
</head>
<body>

    <div id="titlePage">
        <div class="menu-card">
            <h1 style="color:var(--gold); margin-bottom:10px;">Teacher Dashboard</h1>
            <select id="levelSelect" style="padding:10px; width:100%; margin-bottom:10px;">
                <option value="easy">Level 1: Easy (Nouns)</option>
                <option value="medium">Level 2: Medium (Actions/Jobs)</option>
                <option value="hard">Level 3: Hard (Feelings/Places)</option>
            </select>
            <textarea id="customInput" placeholder="Paste custom words here (comma separated)..."></textarea>
            <button class="btn btn-correct" style="width:100%" onclick="startGame()">START LESSON</button>
        </div>
    </div>

    <div id="gameBoard">
        <div class="border-trim top-trim"></div>
        <div id="particles"></div>
        
        <div class="content">
            <div id="timer">02:00</div>
            <div id="wordDisplay">READY?</div>
            
            <div class="controls">
                <button class="btn btn-pass" onclick="handlePass()">PASS</button>
                <button class="btn btn-correct" onclick="handleCorrect()">CORRECT</button>
                <button class="btn btn-pause" id="pauseBtn" onclick="togglePause()">PAUSE</button>
            </div>
        </div>

        <div class="border-trim bottom-trim"></div>
    </div>

    <div id="reviewScreen">
        <h1 style="color:var(--gold);">Review Time!</h1>
        <div style="overflow-y: auto; width:100%; display:flex; justify-content:center;">
            <table id="reviewTable">
                <thead><tr><th>Word</th><th>Result</th></tr></thead>
                <tbody id="reviewBody"></tbody>
            </table>
        </div>
        <button class="btn btn-correct" style="margin-top:20px;" onclick="location.reload()">RESTART</button>
    </div>

    <script>
        const levels = {
            easy: ['Pencil', 'Elephant', 'Sandwich', 'Backpack', 'Umbrella', 'Banana', 'Pizza'],
            medium: ['Spain', 'Flight Attendant', 'Cooking', 'Market', 'Dentist', 'Dancing', 'Hospital'],
            hard: ['Wedding', 'Nervous', 'Japan', 'Nostalgia', 'Frustrated', 'Graduation', 'Bored']
        };

        let words = [];
        let history = [];
        let score = 0;
        let timeLeft = 120;
        let timer = null;
        let paused = false;

        // Audio Placeholders
        const sndCorrect = new Audio('correct.mp3');
        const sndPass = new Audio('pass.mp3');
        const sndMusic = new Audio('gamemusic1.mp3');
        const sndTimer = new Audio('timer.mp3');
        sndMusic.loop = true;

        // Create Floating Suns
        const particleContainer = document.getElementById('particles');
        for (let i = 0; i < 15; i++) {
            const sun = document.createElement('div');
            sun.className = 'sun-particle';
            sun.innerHTML = '☀';
            sun.style.left = Math.random() * 100 + 'vw';
            sun.style.animationDuration = (Math.random() * 10 + 10) + 's';
            sun.style.animationDelay = (Math.random() * 10) + 's';
            particleContainer.appendChild(sun);
        }

        function startGame() {
            const custom = document.getElementById('customInput').value;
            if (custom.trim()) {
                words = custom.split(',').map(s => s.trim());
            } else {
                words = [...levels[document.getElementById('levelSelect').value]];
            }
            words.sort(() => Math.random() - 0.5);

            document.getElementById('titlePage').classList.add('hidden');
            document.getElementById('gameBoard').style.display = 'block';
            
            sndMusic.play().catch(e => console.log("Audio waiting for interaction"));
            nextWord();
            startTimer();
        }

        function startTimer() {
            timer = setInterval(() => {
                if (!paused) {
                    timeLeft--;
                    updateTimerUI();
                    if (timeLeft === 10) {
                        document.getElementById('timer').classList.add('panic');
                        sndTimer.play();
                    }
                    if (timeLeft <= 0) endGame();
                }
            }, 1000);
        }

        function updateTimerUI() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function nextWord() {
            if (words.length === 0) return endGame();
            const word = words.pop();
            const display = document.getElementById('wordDisplay');
            display.innerText = word;
            
            // Re-trigger animation
            display.style.animation = 'none';
            display.offsetHeight;
            display.style.animation = null;
        }

        function handleCorrect() {
            if (paused) return;
            history.push({ word: document.getElementById('wordDisplay').innerText, status: 'Correct' });
            score++;
            sndCorrect.currentTime = 0;
            sndCorrect.play();
            
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#0047ab', '#fcd116', '#ffffff']
            });
            nextWord();
        }

        function handlePass() {
            if (paused) return;
            history.push({ word: document.getElementById('wordDisplay').innerText, status: 'Passed' });
            sndPass.currentTime = 0;
            sndPass.play();
            nextWord();
        }

        function togglePause() {
            paused = !paused;
            document.getElementById('pauseBtn').innerText = paused ? "RESUME" : "PAUSE";
            document.getElementById('wordDisplay').style.visibility = paused ? 'hidden' : 'visible';
        }

        function endGame() {
            clearInterval(timer);
            sndMusic.pause();
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('reviewScreen').style.display = 'flex';
            
            const tbody = document.getElementById('reviewBody');
            history.forEach(item => {
                const row = ` <tr class="${item.status === 'Correct' ? 'row-correct' : 'row-passed'}">
                    <td>${item.word}</td><td>${item.status}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }
    </script>
</body>
</html>
