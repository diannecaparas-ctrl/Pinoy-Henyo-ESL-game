<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoy Henyo - Professional Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto+Condensed:wght@700&display=swap');
        :root { --gold: #f1c40f; --orange: #e67e22; --red: #e74c3c; --dark: #2c3e50; }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background: radial-gradient(circle, #f39c12 0%, #d35400 70%, #8e0000 100%);
            color: white; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .game-container {
            width: 95vw; height: 90vh; border: 12px solid var(--dark); border-radius: 50px;
            background: rgba(0, 0, 0, 0.15); position: relative; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        .screen { display: none; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.5s; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Setup Screen Styles */
        .setup-box { background: rgba(255,255,255,0.9); color: #333; padding: 25px; border-radius: 20px; width: 600px; }
        .cat-group { margin-bottom: 10px; }
        .cat-group label { font-weight: bold; color: var(--dark); display: block; }
        .cat-group input { width: 96%; padding: 8px; border: 2px solid #ddd; border-radius: 8px; }

        /* Game Display */
        .hud {
            position: absolute; top: 30px; width: 92%; display: flex; justify-content: space-between;
            padding: 20px 60px; background: rgba(0,0,0,0.8); border-radius: 100px; align-items: center;
        }
        .lives-container { display: flex; gap: 15px; font-size: 3rem; }
        .heart { color: var(--red); text-shadow: 3px 3px #000; transition: 0.4s; }
        .heart.lost { filter: grayscale(1); transform: translateY(20px); opacity: 0; }

        .word-box {
            background: #fff; color: #111; padding: 40px; border-radius: 30px;
            width: 800px; height: 250px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 20px 0px #bdc3c7; margin: 40px 0;
        }
        #word-text { font-size: 8rem; text-align: center; text-transform: uppercase; }

        .btn {
            padding: 18px 50px; font-size: 1.6rem; font-weight: 900; border-radius: 100px; border: none; cursor: pointer; color: white;
            background: linear-gradient(to bottom, #f1c40f 0%, #d35400 100%); box-shadow: 0 8px 0 #914500; text-transform: uppercase;
        }
        .btn-blue { background: #3498db; box-shadow: 0 8px 0 #2980b9; }
        .btn-grey { background: #7f8c8d; box-shadow: 0 8px 0 #2c3e50; }

        #end-modal {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; 
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div class="game-container">
    
    <!-- PAGE 1: TITLE SCREEN -->
    <div id="title-screen" class="screen active">
        <h1 style="font-family:'Luckiest Guy'; font-size:10rem; color:var(--gold); margin:0; text-shadow: 10px 10px 0 #000;">PINOY HENYO</h1>
        <p style="font-size: 2rem; letter-spacing: 5px; margin-bottom: 40px;">CLASSROOM EDITION</p>
        <button class="btn" onclick="showScreen('dashboard-screen')">ENTER DASHBOARD</button>
    </div>

    <!-- PAGE 2: TEACHER DASHBOARD (MEMORY) -->
    <div id="dashboard-screen" class="screen">
        <h1 style="font-family:'Luckiest Guy'; font-size:3rem; color:var(--gold);">TEACHER SETTINGS</h1>
        <div class="setup-box">
            <div class="cat-group"><label>🍔 FOOD</label><input type="text" class="save-data" data-cat="FOOD"></div>
            <div class="cat-group"><label>👮 JOB</label><input type="text" class="save-data" data-cat="JOB"></div>
            <div class="cat-group"><label>🦁 ANIMAL</label><input type="text" class="save-data" data-cat="ANIMAL"></div>
            <div class="cat-group"><label>📍 PLACE</label><input type="text" class="save-data" data-cat="PLACE"></div>
            <div class="cat-group"><label>🏃 ACTION</label><input type="text" class="save-data" data-cat="ACTION"></div>
            <div class="cat-group"><label>💡 OBJECT</label><input type="text" class="save-data" data-cat="OBJECT"></div>
            <div style="margin-top:20px; display:flex; gap:10px; justify-content: center;">
                <button class="btn" onclick="prepareGame()">START GAME</button>
                <button class="btn btn-grey" onclick="resetMemory()">RESET WORDS</button>
                <button class="btn btn-blue" onclick="showScreen('title-screen')">BACK</button>
            </div>
        </div>
    </div>

    <!-- PAGE 3: GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div class="hud">
            <div id="category-display" style="font-size: 2rem; font-family: 'Luckiest Guy'; color: var(--gold);">CATEGORY: ???</div>
            <div class="lives-container">
                <span class="heart" id="h1">❤</span>
                <span class="heart" id="h2">❤</span>
                <span class="heart" id="h3">❤</span>
            </div>
            <div id="timer-display" style="font-size: 2.5rem; font-family: 'Luckiest Guy';">02:00</div>
        </div>
        
        <div class="word-box"><div id="word-text">READY?</div></div>

        <div style="display:flex; gap:30px;">
            <button class="btn" style="background:#2ecc71; box-shadow:0 8px 0 #27ae60" onclick="handleCorrect()">CORRECT ✔</button>
            <button class="btn" style="background:#e74c3c; box-shadow:0 8px 0 #c0392b" onclick="handlePass()">PASS ⏭</button>
        </div>
        <h2 style="margin-top:20px">SCORE: <span id="score" style="color:var(--gold)">0</span></h2>
    </div>

    <!-- END MODAL -->
    <div id="end-modal">
        <h1 id="end-title" style="font-size:8rem; color:var(--red); font-family:'Luckiest Guy'; text-align:center;"></h1>
        <p style="font-size:3rem">FINAL SCORE: <span id="final-score" style="color:var(--gold)">0</span></p>
        <button class="btn" onclick="location.reload()">RESTART SESSION</button>
    </div>
</div>

<!-- Sounds -->
<audio id="snd-start" src="start.mp3"></audio>
<audio id="snd-correct" src="correct.mp3"></audio>
<audio id="snd-pass" src="pass.mp3"></audio>
<audio id="snd-timer" src="timer.mp3"></audio>

<script>
    let gameQueue = [];
    let currentIndex = 0;
    let score = 0;
    let lives = 3;
    let timer;
    let timeLeft = 120;

    // Load Memory on Startup
    window.onload = function() {
        const inputs = document.querySelectorAll('.save-data');
        inputs.forEach(input => {
            const savedValue = localStorage.getItem('henyo_' + input.getAttribute('data-cat'));
            if (savedValue) input.value = savedValue;
        });
    };

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function resetMemory() {
        if(confirm("Clear all saved words?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function prepareGame() {
        gameQueue = [];
        const inputs = document.querySelectorAll('.save-data');
        
        inputs.forEach(input => {
            const cat = input.getAttribute('data-cat');
            const val = input.value;
            localStorage.setItem('henyo_' + cat, val);
            if (val) {
                val.split(',').forEach(w => {
                    if (w.trim()) gameQueue.push({ word: w.trim(), cat: cat });
                });
            }
        });

        if (gameQueue.length === 0) return alert("Please enter some words!");
        
        gameQueue.sort(() => Math.random() - 0.5);
        showScreen('game-screen');
        showWord();
        startTimer();
    }

    function showWord() {
        if (currentIndex < gameQueue.length) {
            const item = gameQueue[currentIndex];
            const textEl = document.getElementById('word-text');
            textEl.innerText = item.word;
            document.getElementById('category-display').innerText = "CATEGORY: " + item.cat;
            
            // Auto-font sizing
            let fs = 8; textEl.style.fontSize = fs + "rem";
            while ((textEl.scrollHeight > 250 || textEl.scrollWidth > 750) && fs > 2) {
                fs -= 0.5; textEl.style.fontSize = fs + "rem";
            }
        } else { endGame("VICTORY!"); }
    }

    function handleCorrect() {
        document.getElementById('snd-correct').play();
        score++;
        document.getElementById('score').innerText = score;
        next();
    }

    function handlePass() {
        document.getElementById('snd-pass').play();
        document.getElementById('h' + lives).classList.add('lost');
        lives--;

        if (lives === 0) {
            endGame("GAME OVER!"); 
        } else {
            next();
        }
    }

    function next() { currentIndex++; showWord(); }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (timeLeft === 10) document.getElementById('snd-timer').play();
            if (timeLeft <= 0) endGame("TIME'S UP!");
        }, 1000);
    }

    function endGame(msg) {
        clearInterval(timer);
        if (msg === "GAME OVER!") {
            document.getElementById('snd-start').play(); // Start sound plays for Game Over
        }
        document.getElementById('end-title').innerText = msg;
        document.getElementById('final-score').innerText = score;
        document.getElementById('end-modal').style.display = 'flex';
    }
</script>
</body>
</html>
