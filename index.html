<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoy Henyo - 3 Hearts Edition</title>
    <script src="https://unpkg.com/compromise"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto+Condensed:wght@700&display=swap');

        :root {
            --gold: #f1c40f;
            --orange: #e67e22;
            --red: #e74c3c;
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background: radial-gradient(circle, #f39c12 0%, #d35400 70%, #8e0000 100%);
            color: white; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .game-container {
            width: 95vw; height: 90vh; border: 10px solid #2c3e50; border-radius: 40px;
            background: rgba(0, 0, 0, 0.1); position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5), 0 20px 50px rgba(0,0,0,0.8);
        }

        .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active { display: flex; }

        h1 { font-family: 'Luckiest Guy', cursive; font-size: 7rem; color: var(--gold); margin: 0; text-shadow: 6px 6px 0px #000; }

        /* HUD & HEARTS */
        .hud {
            position: absolute; top: 40px; width: 90%; display: flex; justify-content: space-between;
            padding: 15px 50px; background: rgba(0,0,0,0.6); border-radius: 100px; box-sizing: border-box; align-items: center;
        }
        .hud div { font-size: 2rem; font-family: 'Luckiest Guy', sans-serif; color: var(--gold); }
        .lives-container { display: flex; gap: 10px; font-size: 2.5rem; }
        .heart { color: var(--red); text-shadow: 2px 2px #000; transition: all 0.3s; }
        .heart.lost { color: #555; filter: grayscale(1); transform: scale(0.8); }

        .word-box {
            background: white; color: #222; padding: 40px 80px; border-radius: 25px;
            font-size: 8rem; box-shadow: 0 20px 0px #bdc3c7; margin: 40px 0; min-width: 600px; text-align: center; text-transform: uppercase;
        }

        /* Buttons */
        .btn {
            padding: 15px 45px; font-size: 1.5rem; font-weight: 900; border-radius: 50px; border: none; cursor: pointer; color: white;
            background: linear-gradient(to bottom, #f1c40f 0%, #d35400 100%); box-shadow: 0 8px 0 #914500;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #914500; }
        .btn-correct { background: linear-gradient(to bottom, #2ecc71, #27ae60); box-shadow: 0 8px 0 #1e8449; }
        .btn-pass { background: linear-gradient(to bottom, #95a5a6, #7f8c8d); box-shadow: 0 8px 0 #566573; }
        .btn-disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        /* End Game Modal */
        #end-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; display: none;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        #end-modal h2 { font-family: 'Luckiest Guy'; font-size: 10rem; color: #ff4757; margin: 0; }
        #end-modal p { font-size: 3rem; margin: 20px 0; }

        .panic { color: #ff4757 !important; animation: pulse 0.5s infinite; }
        @keyframes pulse { 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

<div class="game-container">
    
    <!-- MENU -->
    <div id="menu-screen" class="screen active">
        <h1>PINOY HENYO</h1>
        <textarea id="teacher-input" placeholder="Enter words: Apple, Doctor, Paris, Swimming..." style="width:400px; height:80px; padding:10px; border-radius:10px; margin:20px;"></textarea>
        <button class="btn" onclick="startGame()">START GAME</button>
    </div>

    <!-- GAME -->
    <div id="game-screen" class="screen">
        <div class="hud">
            <div id="category-display">CATEGORY: ???</div>
            <div class="lives-container" id="lives-box">
                <span class="heart" id="h1">❤</span>
                <span class="heart" id="h2">❤</span>
                <span class="heart" id="h3">❤</span>
            </div>
            <div id="timer-display">02:00</div>
        </div>
        
        <div class="word-box" id="word-display">READY?</div>

        <div style="display: flex; gap: 30px;">
            <button class="btn btn-correct" onclick="handleCorrect()">CORRECT ✔</button>
            <button class="btn btn-pass" id="pass-btn" onclick="handlePass()">PASS ⏭</button>
        </div>
        <div style="margin-top:20px; font-size: 2rem;">SCORE: <span id="score" style="color:var(--gold)">0</span></div>
    </div>

    <!-- TIME'S UP MODAL -->
    <div id="end-modal">
        <h2 id="end-title">TIME'S UP!</h2>
        <p>Total Score: <span id="final-score" style="color:var(--gold)">0</span></p>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>
</div>

<audio id="snd-start" src="start.mp3"></audio>
<audio id="snd-correct" src="correct.mp3"></audio>
<audio id="snd-pass" src="pass.mp3"></audio>
<audio id="snd-timer" src="timer.mp3"></audio>

<script>
    let words = [];
    let currentIndex = 0;
    let score = 0;
    let timer;
    let timeLeft = 120;
    let lives = 3;

    function getOfflineCategory(word) {
        const doc = nlp(word);
        if (doc.places().text()) return "PLACE";
        if (doc.verbs().text()) return "ACTION";
        if (doc.people().text()) return "PERSON";
        return "OBJECT / THING";
    }

    function startGame() {
        const input = document.getElementById('teacher-input').value;
        if (!input) return alert("Enter words!");
        words = input.split(',').map(w => w.trim());
        document.getElementById('snd-start').play();
        document.getElementById('menu-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        showWord();
        startTimer();
    }

    function showWord() {
        if (currentIndex < words.length) {
            const currentWord = words[currentIndex];
            document.getElementById('word-display').innerText = currentWord;
            document.getElementById('category-display').innerText = "CATEGORY: " + getOfflineCategory(currentWord);
        } else {
            endGame("ALL WORDS DONE!");
        }
    }

    function handleCorrect() {
        document.getElementById('snd-correct').play();
        score++;
        document.getElementById('score').innerText = score;
        nextWord();
    }

    function handlePass() {
        if (lives > 0) {
            document.getElementById('snd-pass').play();
            document.getElementById('h' + lives).classList.add('lost');
            lives--;
            if (lives === 0) {
                document.getElementById('pass-btn').classList.add('btn-disabled');
                document.getElementById('pass-btn').disabled = true;
            }
            nextWord();
        }
    }

    function nextWord() {
        currentIndex++;
        showWord();
    }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            const display = document.getElementById('timer-display');
            display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            if (timeLeft === 10) {
                document.getElementById('snd-timer').play();
                display.classList.add('panic');
            }
            if (timeLeft <= 0) endGame("TIME'S UP!");
        }, 1000);
    }

    function endGame(reason) {
        clearInterval(timer);
        document.getElementById('end-title').innerText = reason;
        document.getElementById('final-score').innerText = score;
        document.getElementById('end-modal').style.display = 'flex';
    }
</script>

</body>
</html>
