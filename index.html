<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoy Henyo - Ultimate Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto+Condensed:wght@700&display=swap');
        :root { --gold: #f1c40f; --orange: #e67e22; --red: #e74c3c; --dark: #2c3e50; }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background: radial-gradient(circle, #f39c12 0%, #d35400 70%, #8e0000 100%);
            color: white; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .game-container {
            width: 95vw; height: 90vh; border: 12px solid var(--dark); border-radius: 50px;
            background: rgba(0, 0, 0, 0.15); position: relative; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; box-shadow: inset 0 0 100px rgba(0,0,0,0.5), 0 30px 60px rgba(0,0,0,0.8);
        }

        .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active { display: flex; }

        /* Setup Screen Dashboard */
        .setup-box { background: rgba(255,255,255,0.9); color: #333; padding: 20px; border-radius: 20px; width: 600px; max-height: 70vh; overflow-y: auto; }
        .cat-group { margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .cat-group label { font-weight: bold; color: var(--orange); display: block; margin-bottom: 5px; }
        .cat-group input { width: 95%; padding: 8px; border: 2px solid #ccc; border-radius: 5px; }

        /* HUD & HEARTS */
        .hud {
            position: absolute; top: 30px; width: 92%; display: flex; justify-content: space-between;
            padding: 20px 60px; background: rgba(0,0,0,0.8); border-radius: 100px; align-items: center;
        }
        .hud-item { font-size: 2rem; font-family: 'Luckiest Guy'; color: var(--gold); }
        .lives-container { display: flex; gap: 10px; font-size: 2.5rem; }
        .heart { color: var(--red); text-shadow: 2px 2px #000; transition: 0.3s; }
        .heart.lost { filter: grayscale(1); opacity: 0.2; transform: scale(0.8); }

        /* Word Display with Scaling */
        .word-box {
            background: #fff; color: #111; padding: 40px; border-radius: 30px;
            width: 800px; height: 250px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 20px 0px #bdc3c7; margin: 40px 0; text-transform: uppercase;
        }
        #word-text { font-size: 8rem; text-align: center; line-height: 1; word-wrap: break-word; }

        .btn {
            padding: 15px 50px; font-size: 1.5rem; font-weight: 900; border-radius: 100px; border: none; cursor: pointer; color: white;
            background: linear-gradient(to bottom, #f1c40f 0%, #d35400 100%); box-shadow: 0 8px 0 #914500;
        }
        .btn-correct { background: linear-gradient(to bottom, #2ecc71, #27ae60); box-shadow: 0 8px 0 #1e8449; }
        .btn-pass { background: linear-gradient(to bottom, #95a5a6, #7f8c8d); box-shadow: 0 8px 0 #566573; }
        .btn-disabled { opacity: 0.3; pointer-events: none; }

        #end-modal {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; 
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div class="game-container">
    
    <!-- DASHBOARD SETUP -->
    <div id="menu-screen" class="screen active">
        <h1 style="font-family:'Luckiest Guy'; font-size:4rem; color:var(--gold); margin:0;">PINOY HENYO</h1>
        <p>Enter words for each category (comma separated):</p>
        <div class="setup-box" id="category-inputs">
            <!-- Input groups -->
            <div class="cat-group"><label>🍔 FOOD</label><input type="text" data-cat="FOOD" placeholder="Pizza, Adobo, Apple..."></div>
            <div class="cat-group"><label>👮 JOB</label><input type="text" data-cat="JOB" placeholder="Police, Doctor, Teacher..."></div>
            <div class="cat-group"><label>🦁 ANIMAL</label><input type="text" data-cat="ANIMAL" placeholder="Dog, Lion, Cat..."></div>
            <div class="cat-group"><label>📍 PLACE</label><input type="text" data-cat="PLACE" placeholder="School, London, Park..."></div>
            <div class="cat-group"><label>🏃 ACTION</label><input type="text" data-cat="ACTION" placeholder="Swimming, Running, Eating..."></div>
            <div class="cat-group"><label>💡 OBJECT</label><input type="text" data-cat="OBJECT" placeholder="Table, Phone, Car..."></div>
        </div>
        <button class="btn" style="margin-top:20px" onclick="prepareGame()">START GAME</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div class="hud">
            <div id="category-display" class="hud-item">CATEGORY: ???</div>
            <div class="lives-container">
                <span class="heart" id="h1">❤</span>
                <span class="heart" id="h2">❤</span>
                <span class="heart" id="h3">❤</span>
            </div>
            <div id="timer-display" class="hud-item">02:00</div>
        </div>
        <div class="word-box"><div id="word-text">READY?</div></div>
        <div style="display:flex; gap:30px;">
            <button class="btn btn-correct" onclick="handleCorrect()">CORRECT ✔</button>
            <button class="btn btn-pass" id="pass-btn" onclick="handlePass()">PASS ⏭</button>
        </div>
        <div style="margin-top:20px; font-size:2rem">SCORE: <span id="score" style="color:var(--gold)">0</span></div>
    </div>

    <div id="end-modal">
        <h1 id="end-title" style="font-size:8rem; color:var(--red)">TIME'S UP!</h1>
        <p style="font-size:3rem">FINAL SCORE: <span id="final-score" style="color:var(--gold)">0</span></p>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>
</div>

<audio id="snd-start" src="start.mp3"></audio>
<audio id="snd-correct" src="correct.mp3"></audio>
<audio id="snd-pass" src="pass.mp3"></audio>
<audio id="snd-timer" src="timer.mp3"></audio>

<script>
    let gameQueue = [];
    let currentIndex = 0;
    let score = 0;
    let lives = 3;
    let timer;
    let timeLeft = 120;

    function prepareGame() {
        gameQueue = [];
        const inputs = document.querySelectorAll('#category-inputs input');
        inputs.forEach(input => {
            if (input.value) {
                let categoryWords = input.value.split(',');
                categoryWords.forEach(w => {
                    if (w.trim()) gameQueue.push({ word: w.trim(), cat: input.getAttribute('data-cat') });
                });
            }
        });

        if (gameQueue.length === 0) return alert("Please enter at least one word!");
        
        // Shuffle the words so they don't appear category by category
        gameQueue.sort(() => Math.random() - 0.5);
        
        document.getElementById('snd-start').play();
        document.getElementById('menu-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        showWord();
        startTimer();
    }

    function showWord() {
        if (currentIndex < gameQueue.length) {
            const item = gameQueue[currentIndex];
            const textEl = document.getElementById('word-text');
            textEl.innerText = item.word;
            document.getElementById('category-display').innerText = "CATEGORY: " + item.cat;
            
            // Dynamic Font Scaling
            let fontSize = 8;
            textEl.style.fontSize = fontSize + "rem";
            while (textEl.scrollHeight > 200 || textEl.scrollWidth > 750) {
                fontSize -= 0.5;
                textEl.style.fontSize = fontSize + "rem";
                if (fontSize < 2) break;
            }
        } else { endGame("WELL DONE!"); }
    }

    function handleCorrect() {
        document.getElementById('snd-correct').play();
        score++;
        document.getElementById('score').innerText = score;
        next();
    }

    function handlePass() {
        if (lives > 0) {
            document.getElementById('snd-pass').play();
            document.getElementById('h' + lives).classList.add('lost');
            lives--;
            if (lives === 0) document.getElementById('pass-btn').classList.add('btn-disabled');
            next();
        }
    }

    function next() { currentIndex++; showWord(); }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (timeLeft === 10) document.getElementById('snd-timer').play();
            if (timeLeft <= 0) endGame("TIME'S UP!");
        }, 1000);
    }

    function endGame(msg) {
        clearInterval(timer);
        document.getElementById('end-title').innerText = msg;
        document.getElementById('final-score').innerText = score;
        document.getElementById('end-modal').style.display = 'flex';
    }
</script>
</body>
</html>
