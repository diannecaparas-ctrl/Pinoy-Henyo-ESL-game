<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoy Henyo - Orange Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Roboto+Condensed:wght@700&display=swap');
        :root { --gold: #f1c40f; --orange-bright: #f39c12; --orange-dark: #d35400; --red: #e74c3c; --dark-grey: #2c3e50; }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            /* Gradient background matching image_58bed4.jpg */
            background: radial-gradient(circle, #f39c12 0%, #a04000 100%);
            color: white; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .game-container {
            width: 95vw; height: 90vh; border: 12px solid #1a252f; border-radius: 60px;
            background: rgba(0, 0, 0, 0.1); position: relative; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; box-shadow: inset 0 0 100px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }

        .screen { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; justify-content: center; }
        .active { display: flex; }

        /* 2-COLUMN TEACHER DASHBOARD */
        .setup-box { 
            background: rgba(255,255,255,0.9); padding: 25px; border-radius: 25px; 
            width: 850px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }
        .cat-group label { font-weight: bold; color: var(--dark-grey); display: block; font-size: 0.9rem; margin-bottom: 3px; }
        .cat-group input { width: 92%; padding: 10px; border: 2px solid #ccc; border-radius: 10px; font-size: 1rem; }

        /* TITLE PAGE STYLE (image_58bed4.jpg) */
        #title-screen h1, #count-number {
            font-family: 'Luckiest Guy', cursive;
            font-size: 10rem;
            color: var(--gold);
            text-shadow: 6px 8px 0px #000; /* Matching the black shadow depth in image_58be95.jpg */
            margin: 0 0 40px 0;
            letter-spacing: 4px;
        }

        /* HUD & HEARTS */
        .hud {
            width: 90%; height: 80px; display: flex; justify-content: space-between;
            padding: 0 40px; background: rgba(0,0,0,0.85); border-radius: 100px; align-items: center;
        }
        .hearts-container { display: flex; gap: 12px; font-size: 2.8rem; }
        .heart { color: var(--red); text-shadow: 2px 2px #000; }
        .heart.lost { opacity: 0.2; transform: scale(0.8); }

        .word-box {
            background: #fff; color: #111; border-radius: 40px;
            width: 750px; height: 280px; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 20px 0px #bdc3c7;
        }
        #word-text { font-size: 9rem; text-align: center; text-transform: uppercase; font-weight: 900; }

        /* PANIC & SHAKE */
        @keyframes shake { 0%, 100% {transform: translate(0,0)} 25% {transform: translate(3px,3px)} 75% {transform: translate(-3px,-3px)} }
        .panic-shake { animation: shake 0.1s infinite; }
        .panic-mode #timer-display { color: #ff4757 !important; transform: scale(1.2); transition: 0.3s; }

        /* ORANGE BUTTONS (image_58bed4.jpg) */
        .btn {
            padding: 18px 60px; font-size: 1.8rem; font-weight: 900; border-radius: 100px; border: none; cursor: pointer; color: white;
            background: linear-gradient(to bottom, #f39c12 0%, #e67e22 100%); 
            box-shadow: 0 10px 0 #935116; text-transform: uppercase;
        }
        .btn-grey { background: #7f8c8d; box-shadow: 0 10px 0 #2c3e50; }
        .btn-green { background: linear-gradient(to bottom, #2ecc71, #27ae60); box-shadow: 0 10px 0 #1e8449; }
        .btn-red { background: linear-gradient(to bottom, #e74c3c, #c0392b); box-shadow: 0 10px 0 #962d22; }
        .btn:active { transform: translateY(4px); box-shadow: 0 6px 0 #935116; }

        #end-modal {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; 
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div class="game-container" id="main-board">
    
    <!-- TEACHER SETTINGS (2-COLUMN) -->
    <div id="setup-screen" class="screen active">
        <h1 style="font-family:'Luckiest Guy'; font-size:2.5rem; color:var(--gold); margin-bottom:15px;">TEACHER SETTINGS</h1>
        <div class="setup-box">
            <div class="cat-group"><label>🦷 BODY PART</label><input type="text" class="save-data" data-cat="BODY PART"></div>
            <div class="cat-group"><label>📍 PLACE</label><input type="text" class="save-data" data-cat="PLACE"></div>
            <div class="cat-group"><label>🍔 FOOD</label><input type="text" class="save-data" data-cat="FOOD"></div>
            <div class="cat-group"><label>🏃 ACTION</label><input type="text" class="save-data" data-cat="ACTION"></div>
            <div class="cat-group"><label>👮 JOB</label><input type="text" class="save-data" data-cat="JOB"></div>
            <div class="cat-group"><label>💡 OBJECT</label><input type="text" class="save-data" data-cat="OBJECT"></div>
            <div class="cat-group"><label>🦁 ANIMAL</label><input type="text" class="save-data" data-cat="ANIMAL"></div>
            <div class="cat-group"><label>🎆 EVENTS</label><input type="text" class="save-data" data-cat="EVENTS"></div>
        </div>
        <div style="margin-top:25px; display:flex; align-items:center; gap:30px;">
            <div style="background:rgba(0,0,0,0.4); padding:12px 25px; border-radius:50px;">
                <span>🔊 VOL:</span>
                <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5" onchange="updateVolume()">
            </div>
            <button class="btn btn-grey" onclick="resetMemory()">RESET</button>
            <button class="btn btn-green" onclick="saveAndEnter()">ENTER</button>
        </div>
    </div>

    <!-- TITLE SCREEN (image_58bed4.jpg style) -->
    <div id="title-screen" class="screen">
        <h1>PINOY HENYO</h1>
        <div style="display:flex; gap:25px;">
            <button class="btn" onclick="startCountdown()">START</button>
            <button class="btn btn-grey" onclick="showScreen('setup-screen')">BACK</button>
        </div>
    </div>

    <!-- COUNTDOWN (image_58be95.jpg style) -->
    <div id="countdown-screen" class="screen">
        <h1 id="count-number">3</h1>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div class="hud">
            <div id="category-display" style="font-size: 1.8rem; font-family:'Luckiest Guy'; color:var(--gold);">CATEGORY: ???</div>
            <div class="hearts-container">
                <span class="heart" id="life1">❤</span>
                <span class="heart" id="life2">❤</span>
                <span class="heart" id="life3">❤</span>
            </div>
            <div id="timer-display" style="font-size: 2.2rem; font-family:'Luckiest Guy'; color:white;">2:00</div>
        </div>
        <div class="word-box"><div id="word-text">...</div></div>
        <div class="controls" style="margin-top:20px; display:flex; gap:20px;">
            <button class="btn btn-green" onclick="handleCorrect()">CORRECT ✔</button>
            <button class="btn btn-red" onclick="handlePass()">PASS ⏭</button>
        </div>
        <h2 style="margin-top:15px; font-family:'Luckiest Guy'; font-size: 2.5rem;">SCORE: <span id="score" style="color:var(--gold)">0</span></h2>
    </div>

    <!-- END MODAL -->
    <div id="end-modal">
        <h1 id="end-title" style="font-size:7rem; color:var(--gold); font-family:'Luckiest Guy';"></h1>
        <p style="font-size:3rem">FINAL SCORE: <span id="final-score" style="color:var(--gold)">0</span></p>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>
</div>

<!-- Audio -->
<audio id="snd-correct" src="correct.mp3"></audio>
<audio id="snd-pass" src="pass.mp3"></audio>
<audio id="snd-timer" src="timer.mp3"></audio>
<audio id="snd-321go" src="321go.mp3"></audio>
<audio id="snd-finish" src="finish.mp3"></audio>
<audio id="snd-over" src="start.mp3"></audio>

<script>
    let gameQueue = [], currentIndex = 0, score = 0, lives = 3, timer, timeLeft = 120;

    window.onload = function() {
        document.querySelectorAll('.save-data').forEach(input => {
            input.value = localStorage.getItem('henyo_' + input.dataset.cat) || "";
        });
        const v = localStorage.getItem('henyo_vol') || 0.5;
        document.getElementById('vol-slider').value = v;
        updateVolume();
    };

    function updateVolume() {
        const v = document.getElementById('vol-slider').value;
        localStorage.setItem('henyo_vol', v);
        document.querySelectorAll('audio').forEach(a => a.volume = v);
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function saveAndEnter() {
        document.querySelectorAll('.save-data').forEach(input => {
            localStorage.setItem('henyo_' + input.dataset.cat, input.value);
        });
        showScreen('title-screen');
    }

    function resetMemory() {
        if(confirm("Clear all setup data?")) { localStorage.clear(); location.reload(); }
    }

    function startCountdown() {
        showScreen('countdown-screen');
        document.getElementById('snd-321go').play();
        let c = 3;
        const el = document.getElementById('count-number');
        const itv = setInterval(() => {
            c--;
            if(c > 0) el.innerText = c;
            else if(c === 0) el.innerText = "GO!";
            else { clearInterval(itv); prepareGame(); }
        }, 1000);
    }

    function prepareGame() {
        gameQueue = [];
        document.querySelectorAll('.save-data').forEach(input => {
            if(input.value) {
                input.value.split(',').forEach(w => {
                    if(w.trim()) gameQueue.push({w: w.trim(), c: input.dataset.cat});
                });
            }
        });
        if(!gameQueue.length) return showScreen('setup-screen');
        
        // Shuffle
        for (let i = gameQueue.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [gameQueue[i], gameQueue[j]] = [gameQueue[j], gameQueue[i]];
        }
        
        showScreen('game-screen');
        showWord();
        startTimer();
    }

    function showWord() {
        if(currentIndex < gameQueue.length) {
            const item = gameQueue[currentIndex];
            document.getElementById('word-text').innerText = item.w;
            document.getElementById('category-display').innerText = "CATEGORY: " + item.c;
        } else endGame("FINISHED"); 
    }

    function handleCorrect() {
        document.getElementById('snd-correct').play();
        score++;
        document.getElementById('score').innerText = score;
        next();
    }

    function handlePass() {
        document.getElementById('snd-pass').play();
        const heartEl = document.getElementById('life' + lives);
        if(heartEl) heartEl.classList.add('lost');
        lives--;
        
        if(lives <= 0) endGame("OUT OF LIVES");
        else next();
    }

    function next() { currentIndex++; showWord(); }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer-display').innerText = `${m}:${s<10?'0'+s:s}`;
            
            // Panic Mode at 10s
            if(timeLeft === 10) {
                document.getElementById('snd-timer').play();
                document.getElementById('main-board').classList.add('panic-shake', 'panic-mode');
            }
            if(timeLeft <= 0) endGame("TIME'S UP");
        }, 1000);
    }

    function endGame(reason) {
        clearInterval(timer);
        document.getElementById('main-board').classList.remove('panic-shake', 'panic-mode');
        
        if(reason === "FINISHED") {
            document.getElementById('snd-finish').play();
            document.getElementById('end-title').innerText = "CONGRATULATIONS!";
        } else {
            document.getElementById('snd-over').play();
            document.getElementById('end-title').innerText = reason;
        }
        document.getElementById('end-modal').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
    }
</script>
</body>
</html>
