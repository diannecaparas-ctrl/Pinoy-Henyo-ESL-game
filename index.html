<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinoy Henyo - Smart Edition</title>
    <style>
        :root {
            --primary: #d35400; 
            --secondary: #f1c40f; 
            --bg: #2c3e50;
            --text: #ffffff;
        }

        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background: radial-gradient(circle, #e67e22, #d35400);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .screen { display: none; flex-direction: column; align-items: center; text-align: center; width: 90%; }
        .active { display: flex; }

        h1 { font-size: 5rem; text-shadow: 4px 4px #000; margin: 10px 0; }
        .subtitle { font-size: 1.2rem; margin-bottom: 2rem; opacity: 0.9; }

        textarea {
            width: 100%;
            max-width: 600px;
            height: 120px;
            border-radius: 15px;
            padding: 15px;
            font-size: 1rem;
            border: 4px solid #000;
            margin-bottom: 20px;
        }

        .btn-group { display: flex; gap: 15px; }
        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: 4px solid #000;
            border-radius: 12px;
            background: var(--secondary);
            box-shadow: 0 6px #000;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px #000; }

        /* Game Page Layout */
        .game-header {
            position: absolute;
            top: 30px;
            width: 92%;
            display: flex;
            justify-content: space-between;
            font-size: 1.8rem;
            font-weight: bold;
        }

        #word-display {
            font-size: 9rem;
            text-transform: uppercase;
            margin: 40px 0;
            background: rgba(0,0,0,0.3);
            padding: 40px 80px;
            border-radius: 30px;
            border: 5px solid #fff;
        }

        .controls { display: flex; gap: 20px; }
        .correct-btn { background: #27ae60; color: white; }
        .pass-btn { background: #7f8c8d; color: white; }
        
        #timer-display.panic { color: #ff0000; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .score-box { font-size: 1.5rem; margin-top: 30px; background: #000; padding: 10px 20px; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- MAIN MENU -->
    <div id="menu-screen" class="screen active">
        <h1>PINOY HENYO</h1>
        <p class="subtitle">Smart AI-Categorization Enabled</p>
        <textarea id="teacher-input" placeholder="Type words separated by commas... (e.g. Giraffe, Hospital, Dentist, Hamburger)"></textarea>
        <div class="btn-group">
            <button onclick="startGame()">START GAME</button>
        </div>
    </div>

    <!-- GAME PAGE -->
    <div id="game-screen" class="screen">
        <div class="game-header">
            <div id="category-display">CATEGORY: ???</div>
            <div id="timer-display">02:00</div>
        </div>
        
        <div id="word-display">READY?</div>

        <div class="controls">
            <button class="correct-btn" onclick="handleCorrect()">CORRECT</button>
            <button class="pass-btn" onclick="handlePass()">PASS</button>
            <button onclick="togglePause()">⏸/▶</button>
        </div>

        <div class="score-box">
            Score: <span id="score">0</span>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; font-size:0.8rem; background: #c0392b; color:white;">END SESSION</button>
    </div>

    <!-- AUDIO ELEMENTS -->
    <audio id="snd-start" src="start.mp3"></audio>
    <audio id="snd-correct" src="correct.mp3"></audio>
    <audio id="snd-pass" src="pass.mp3"></audio>
    <audio id="snd-timer" src="timer.mp3"></audio>

    <script>
        let words = [];
        let currentIndex = 0;
        let score = 0;
        let timer;
        let timeLeft = 120;
        let isPaused = false;

        // The "Brain": This function talks to the Datamuse API
        async function fetchSmartCategory(word) {
            document.getElementById('category-display').innerText = "CATEGORY: THINKING...";
            try {
                // We ask the API: "What is [word] a kind of?" (rel_spc = hypernyms)
                const response = await fetch(`https://api.datamuse.com/words?rel_spc=${word}&max=3`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    // We take the first result and capitalize it
                    return data[0].word.toUpperCase();
                }
                return "GENERAL";
            } catch (error) {
                return "GENERAL";
            }
        }

        async function startGame() {
            const input = document.getElementById('teacher-input').value;
            if (!input) return alert("Please enter words!");
            
            words = input.split(',').map(w => w.trim());
            document.getElementById('snd-start').play();
            
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            
            await showWord();
            startTimer();
        }

        async function showWord() {
            if (currentIndex < words.length) {
                const currentWord = words[currentIndex];
                document.getElementById('word-display').innerText = currentWord;
                
                // Fetch the AI category
                const category = await fetchSmartCategory(currentWord);
                document.getElementById('category-display').innerText = "CATEGORY: " + category;
            } else {
                endGame();
            }
        }

        function handleCorrect() {
            document.getElementById('snd-correct').play();
            score++;
            document.getElementById('score').innerText = score;
            nextWord();
        }

        function handlePass() {
            document.getElementById('snd-pass').play();
            nextWord();
        }

        async function nextWord() {
            currentIndex++;
            await showWord();
        }

        function startTimer() {
            timer = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft === 10) document.getElementById('snd-timer').play();
                    if (timeLeft <= 0) endGame();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            const display = document.getElementById('timer-display');
            display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (timeLeft <= 10) display.classList.add('panic');
        }

        function togglePause() {
            isPaused = !isPaused;
        }

        function endGame() {
            clearInterval(timer);
            alert("TIME'S UP! Final Score: " + score);
            location.reload();
        }
    </script>
</body>
</html>
