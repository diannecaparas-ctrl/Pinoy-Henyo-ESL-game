<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pinoy Henyo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
let currentIndex = 0;
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    background:linear-gradient(135deg,#061a40,#000814);
    color:white;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hidden{
    display:none!important;
}

/* BACKGROUND */

#bg{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-1;
}

.shape{
    position:absolute;
    background:rgba(255,255,255,.06);
    animation:float 25s linear infinite;
}

.circle{
    border-radius:50%;
}

.square{
    border-radius:20%;
}

@keyframes float{
    from{
        transform:translateY(100vh) rotate(0deg);
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
    }
}

/* GENERAL */

.screen{
    width:100%;
    max-width:1000px;
    text-align:center;
    padding:20px;
}

h1{
    font-size:4.5rem;
    color:#ffd60a;
    font-weight:900;
    text-shadow:0 0 25px rgba(255,214,10,.5);
}

.subtitle{
    margin-top:10px;
    font-size:1.3rem;
    color:#dbeafe;
}

/* START SCREEN */

select,
textarea{
    width:100%;
    margin-top:20px;
    border:none;
    border-radius:16px;
    padding:16px;
    font-size:1rem;
    background:rgba(255,255,255,.08);
    color:white;
    outline:none;
}

textarea{
    height:140px;
    resize:none;
}

.start-btn{
    margin-top:25px;
    padding:18px 40px;
    border:none;
    border-radius:16px;
    background:#ffd60a;
    color:#001d3d;
    font-size:1.2rem;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 0 25px rgba(255,214,10,.3);
}

/* GAME */

.topbar{
    margin-bottom:40px;
}

.timer{
    font-size:3.5rem;
    color:#ffd60a;
    font-weight:900;
}

.category{
    margin-top:10px;
    display:inline-block;
    background:rgba(255,255,255,.08);
    padding:10px 18px;
    border-radius:14px;
}

.word-area{
    height:42vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.word{
    font-size:clamp(5rem,10vw,8rem);
    font-weight:900;
    white-space:nowrap;
    animation:
        slideLoop 8s ease-in-out infinite,
        bounceIn .4s ease;
}

@keyframes slideLoop{
    0%{transform:translateX(25px);}
    50%{transform:translateX(-25px);}
    100%{transform:translateX(25px);}
}

@keyframes bounceIn{
    0%{
        opacity:0;
        transform:scale(.5);
    }
    70%{
        transform:scale(1.1);
    }
    100%{
        opacity:1;
        transform:scale(1);
    }
}

/* BUTTONS */

.controls{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.btn{
    min-width:170px;
    padding:22px 35px;
    border:none;
    border-radius:18px;
    color:white;
    font-size:1.2rem;
    font-weight:700;
    cursor:pointer;
}

.pass{background:#f97316;}
.correct{background:#16a34a;}
.pause{background:#2563eb;}

/* WARNING */

.warning{
    animation:borderFlash .5s infinite alternate;
}

@keyframes borderFlash{
    from{
        box-shadow:0 0 0 0 rgba(255,0,0,.2);
    }
    to{
        box-shadow:0 0 30px 8px rgba(255,0,0,.8);
    }
}

.shake{
    animation:shake .25s infinite;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-4px);}
    50%{transform:translateX(4px);}
    75%{transform:translateX(-4px);}
    100%{transform:translateX(0);}
}

/* REVIEW */

table{
    width:100%;
    margin-top:25px;
    border-collapse:collapse;
    background:rgba(255,255,255,.05);
}

th,td{
    padding:14px;
    border:1px solid rgba(255,255,255,.1);
}

.green{
    color:#22c55e;
}

.orange{
    color:#f59e0b;
}

.restart{
    margin-top:25px;
    padding:16px 30px;
    border:none;
    border-radius:15px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){
    h1{
        font-size:3rem;
    }

    .word{
        font-size:4rem;
    }

    .btn{
        min-width:130px;
        padding:18px;
    }
}
<style>

/* your existing CSS above */


/* --- ADD THIS NEW CSS BELOW --- */

.category{
  margin-top:10px;
  display:inline-block;
  padding:10px 18px;
  border-radius:14px;
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.75);
  font-size:1rem;
}

.bounce{
  animation:bouncePop .35s ease;
}

@keyframes bouncePop{
  0%{
    transform:scale(.6);
    opacity:0;
  }
  70%{
    transform:scale(1.1);
  }
  100%{
    transform:scale(1);
    opacity:1;
  }
}

</style>
</style>
</head>
<body>

<div id="bg"></div>

<!-- START SCREEN -->
<div id="startScreen" class="screen">
    <h1>PINOY HENYO</h1>
    <div class="subtitle">How many words can you guess?</div>

    <select id="levelSelect">
        <option value="easy">Level 1 (Easy)</option>
        <option value="medium">Level 2 (Medium)</option>
        <option value="hard">Level 3 (Hard)</option>
    </select>

    <textarea id="customWords"
    placeholder="Paste custom words separated by commas:
apple, tiger, doctor, Thailand"></textarea>

    <button class="start-btn" onclick="startGame()">START GAME</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen hidden">
    <div class="topbar">
        <div id="timer" class="timer">120</div>
       <div id="category-display" class="category">Category</div>
    </div>

    <div class="word-area">
        <div id="word-display" class="word">READY</div>
    </div>

    <div class="controls">
        <button class="btn pass" onclick="passWord()">PASS</button>
        <button class="btn correct" onclick="function correctWord() {
  guessed.push(words[currentIndex].word);

  if (!firstGuessTimestamp) {
    firstGuessTimestamp = new Date().toLocaleTimeString();
  }

  playAudio("correctSound");

  confetti({
    particleCount: 120,
    spread: 90,
    origin: { y: .6 },
    colors: ["#ffd60a", "#2563eb"]
  });

  currentIndex++;
  showWord();
}">CORRECT</button>
        <button class="btn pause" onclick="pauseGame()">PAUSE</button>
    </div>
</div>

<!-- REVIEW -->
<div id="reviewScreen" class="screen hidden">
    <h1>GAME OVER</h1>
    <div id="firstGuessTime"></div>

    <table>
        <thead>
            <tr>
                <th>Word</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="reviewBody"></tbody>
    </table>

    <button class="restart" onclick="location.reload()">PLAY AGAIN</button>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="correct.mp3"></audio>
<audio id="passSound" src="pass.mp3"></audio>
<audio id="music" src="gamemusic1.mp3" loop></audio>
<audio id="timerSound" src="timer.mp3"></audio>

<script>
const builtInWords = {
  easy: [
    { word: "Chair", category: "Object / Animal / Food" },
    { word: "Tiger", category: "Object / Animal / Food" },
    { word: "Pizza", category: "Object / Animal / Food" },
    { word: "Banana", category: "Object / Animal / Food" },
    { word: "Dog", category: "Object / Animal / Food" },
    { word: "Apple", category: "Object / Animal / Food" }
  ],

  medium: [
    { word: "Running", category: "Action / Place / Job" },
    { word: "Airport", category: "Action / Place / Job" },
    { word: "Doctor", category: "Action / Place / Job" },
    { word: "Teacher", category: "Action / Place / Job" },
    { word: "Swimming", category: "Action / Place / Job" }
  ],

  hard: [
    { word: "Excited", category: "Feeling / Country / Event" },
    { word: "Thailand", category: "Feeling / Country / Event" },
    { word: "Festival", category: "Feeling / Country / Event" },
    { word: "Wedding", category: "Feeling / Country / Event" }
  ]
};
let words=[];
let guessed=[];
let passed=[];
let currentWord="";
let timer=120;
let timerInterval;
let paused=false;
let firstGuessTimestamp=null;

/* BACKGROUND */

function createShapes(){
    const bg=document.getElementById("bg");

    for(let i=0;i<25;i++){
        const shape=document.createElement("div");
        shape.className=Math.random()>0.5 ? "shape circle":"shape square";
        const size=20+Math.random()*100;

        shape.style.width=size+"px";
        shape.style.height=size+"px";
        shape.style.left=Math.random()*100+"%";
        shape.style.animationDuration=(15+Math.random()*20)+"s";
        shape.style.animationDelay=Math.random()*-20+"s";

        bg.appendChild(shape);
    }
}
createShapes();

/* UTIL */

function shuffle(array){
    return array.sort(()=>Math.random()-0.5);
}

function playAudio(id){
    const a=document.getElementById(id);
    a.currentTime=0;
    a.play().catch(()=>{});
}

/* GAME */

function startGame() {
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  let custom = document.getElementById("customWords")
    .value
    .trim();

  if (custom) {
    words = custom
      .split(",")
      .map(w => w.trim())
      .filter(w => w.length > 0)
      .map(w => ({
        word: w,
        category: "Custom"
      }));

  } else {
    const level = document.getElementById("levelSelect").value;
    words = [...builtInWords[level]];
  }

  words = shuffle(words);

  playAudio("music");

  currentIndex = 0;

  showWord();

  timerInterval = setInterval(updateTimer, 1000);
}

    playAudio("music");
    function showWord() {
  if (currentIndex >= words.length) {
    endGame();
    return;
  }

  const current = words[currentIndex];

  const wordEl = document.getElementById("word-display");
  const categoryEl = document.getElementById("category-display");

  categoryEl.innerText = current.category;
  wordEl.innerText = current.word;

  wordEl.classList.remove("bounce");
  void wordEl.offsetWidth;
  wordEl.classList.add("bounce");
}

function function passWord() {
  passed.push(words[currentIndex].word);

  playAudio("passSound");

  currentIndex++;
  showWord();
}{
    passed.push(currentWord);
    playAudio("passSound");
    nextWord();
}

function pauseGame(){
    paused=!paused;

    document.querySelector(".pause").innerText=
        paused ? "RESUME" : "PAUSE";
}

function updateTimer(){

    if(paused) return;

    timer--;
    document.getElementById("timer").innerText=timer;

    if(timer<=10){
        document.body.classList.add("warning");
        document.getElementById("timer").classList.add("shake");
        playAudio("timerSound");
    }

    if(timer<=0){
        endGame();
    }
}

function endGame(){

    clearInterval(timerInterval);

    document.getElementById("music").pause();

    document.getElementById("gameScreen")
        .classList.add("hidden");

    document.getElementById("reviewScreen")
        .classList.remove("hidden");

    const tbody=document.getElementById("reviewBody");

    guessed.forEach(word=>{
        tbody.innerHTML += `
        <tr>
            <td>${word}</td>
            <td class="green">Guessed</td>
        </tr>`;
    });

    passed.forEach(word=>{
        tbody.innerHTML += `
        <tr>
            <td>${word}</td>
            <td class="orange">Passed</td>
        </tr>`;
    });

    document.getElementById("firstGuessTime").innerHTML=
        firstGuessTimestamp
        ? `First correct guess: <b>${firstGuessTimestamp}</b>`
        : "No correct guesses.";
}
</script>

</body>
</html>
